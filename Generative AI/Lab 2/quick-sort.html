<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Sort Visualizer</title>
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Quick Sort Demo</h1>
      <p>
        Enter a list of numbers separated by commas, then click
        <strong>Sort</strong>.
      </p>

      <label for="inputArray">Array values</label>
      <input id="inputArray" type="text" value="3, 5,2, 6 ,1" />

      <button id="sortButton">Sort with Quick Sort</button>

      <div id="output" class="result">Sorted result will appear here.</div>
      <div id="errorMessage" class="error"></div>
    </div>
    <script src="Script.js"></script>
  </body>
</html>
