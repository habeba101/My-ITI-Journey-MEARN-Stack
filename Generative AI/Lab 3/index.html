<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gen AI Assistant</title>
    <link rel="stylesheet" href="Style.css?v=3" />
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <span class="brand-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z" />
              <path d="M18 15l.9 2.1L21 18l-2.1.9L18 21l-.9-2.1L15 18l2.1-.9L18 15z" />
            </svg>
          </span>
          <div>
            <p class="brand-label">Workspace</p>
            <h2>Gen AI</h2>
          </div>
        </div>

        <button class="new-chat" type="button">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M12 5v14M5 12h14" />
          </svg>
          <span>New chat</span>
        </button>

        <div class="section-title">Recent chats</div>
        <nav class="history" aria-label="Chat history">
          <p class="history-empty">No saved chats yet.</p>
        </nav>
      </aside>

      <section class="chat" aria-label="Chat interface">
        <header class="topbar">
          <div>
            <p class="topbar-label">Assistant</p>
            <h1>Chat</h1>
          </div>
          <div class="model-panel">
            <label for="model-select">Model</label>
            <select id="model-select" class="model-select"></select>
            <div class="capabilities" aria-label="Model capabilities"></div>
          </div>
        </header>

        <div class="messages" aria-live="polite"></div>

        <footer class="composer-wrap">
          <div class="attachment-preview" aria-live="polite"></div>
          <form class="composer">
            <button class="attach" type="button" aria-label="Attach file">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M21.4 11.6 12 21a6 6 0 0 1-8.5-8.5l9.8-9.8a4 4 0 0 1 5.7 5.7l-9.8 9.8a2 2 0 0 1-2.8-2.8l9.4-9.4" />
              </svg>
            </button>
            <input class="file-input" type="file" hidden />
            <textarea
              placeholder="Ask anything..."
              aria-label="Message"
              rows="1"></textarea>
            <button class="send" type="submit" aria-label="Send message">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M5 12h13M13 6l6 6-6 6" />
              </svg>
            </button>
          </form>
          <p class="hint">Chats are saved in MongoDB.</p>
        </footer>
      </section>
    </main>
    <script src="Script.js?v=3"></script>
  </body>
</html>
