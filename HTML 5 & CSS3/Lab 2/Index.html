<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITI Task Management System</title>
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body>
    <h1>ITI Task Managemnt</h1>
    <div class="container">
      <div class="task-board">
        <h3>📋Tasks Board</h3>
        <p class="counter">0</p>

        <input
          type="text"
          name="task"
          class="task"
          placeholder="Add a Task..."
        />
        <input type="button" value="Add" class="task-btn" />

        <span class="start">No Task yet. Add Tasks here</span>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="Script.js"></script>
  </body>
</html>
