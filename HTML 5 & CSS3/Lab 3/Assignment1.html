<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="Assignment1.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Form</title>
  </head>
  <body>
    <div class="container">
      <h2>Registration Form</h2>
      <form action="#" id="form">
        <input type="text" placeholder="Username" id="username" required />
        <input type="email" placeholder="Email" class="email" required />
        <input
          type="password"
          placeholder="Password"
          class="pass"
          required
          pattern="^[A-Z][a-z0-9]{5}$"
        />
        <input
          type="number"
          placeholder="Age"
          class="age"
          required
          min="20"
          max="60"
        />
        <input type="submit" value="Submit" class="savebtn" />
      </form>
    </div>

    <script src="Assignment1.js"></script>
  </body>
</html>
